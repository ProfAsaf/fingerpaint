<title>Fingerpaint</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:none}
  #stage{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;background:#000}
  .pad{position:fixed;top:0;height:12vh;width:19vw;z-index:5}
  .pad.l{left:0}.pad.r{right:0}
  .pad.b{top:auto;bottom:0;width:15vw;height:9vh}
  .tick{position:fixed;top:0;width:34px;height:34px;z-index:4;opacity:.0;transition:opacity .6s;pointer-events:none}
  .tick.l{left:0;border-top:2px solid #fff;border-left:2px solid #fff;border-top-left-radius:8px}
  .tick.r{right:0;border-top:2px solid #fff;border-right:2px solid #fff;border-top-right-radius:8px}
  .tick.show{opacity:.28}
  #menu,#menu2{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
        background:rgba(10,9,8,.5);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
  #menu.open,#menu2.open{display:flex}
  .card{display:flex;flex-direction:column;gap:7px;padding:15px;min-width:172px;
        background:rgba(40,38,34,.92);border:1px solid rgba(255,255,255,.18);border-radius:15px}
  .ttl{font:600 10px/1.2 ui-monospace,monospace;letter-spacing:.18em;text-transform:uppercase;
        color:rgba(242,237,225,.5);margin:1px 2px 4px;text-align:center}
  #list{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  #actions{display:flex;flex-direction:column;gap:7px}

const stage=document.getElementById('stage'), menu=document.getElementById('menu'), menu2=document.getElementById('menu2'), list=document.getElementById('list'), actions=document.getElementById('actions');
const hint=document.getElementById('hint'), tickL=document.getElementById('tickL'), tickR=document.getElementById('tickR');
let current=null;

// ---- one shared audio engine in the launcher (unlocked by a single tap) ----
var OAC=null,Om=null,Owf=null,Owg=null,Osrc=null,Ostarted=false,OwavesOn=true,musicG=null,touchG=null,musicVol=6,touchVol=8;
var OPENT=[523.25,587.33,659.25,783.99,880.00];
function oNoise(){ var n=OAC.sampleRate*2,b=OAC.createBuffer(1,n,OAC.sampleRate),d=b.getChannelData(0); for(var i=0;i<n;i++) d[i]=Math.random()*2-1; return b; }
function oInit(){ try{ if(navigator.audioSession) navigator.audioSession.type='ambient'; }catch(e){}
  try{ OAC=new (window.AudioContext||window.webkitAudioContext)();
    Om=OAC.createGain(); Om.gain.value=0.6; Om.connect(OAC.destination);
    musicG=OAC.createGain(); musicG.gain.value=musicVol/10; musicG.connect(Om);
    touchG=OAC.createGain(); touchG.gain.value=touchVol/10; touchG.connect(Om);
    Owf=OAC.createBiquadFilter(); Owf.type='lowpass'; Owf.frequency.value=400; Owf.Q.value=0.6; Owf.connect(musicG);
    Owg=OAC.createGain(); Owg.gain.value=0.012; Owg.connect(Owf);
    Osrc=OAC.createBufferSource(); Osrc.buffer=oNoise(); Osrc.loop=true; Osrc.connect(Owg); Osrc.start();
    oWave(true);
  }catch(e){} }
function oWave(fast){ if(!OAC) return; var t=OAC.currentTime;
  if(OwavesOn){ var peak=0.055+Math.random()*0.03, up=fast?0.7:(2.2+Math.random()*1.6), down=3.6+Math.random()*2.4;
    try{ Owg.gain.cancelScheduledValues(t); Owg.gain.setValueAtTime(Math.max(0.0005,Owg.gain.value),t); Owg.gain.linearRampToValueAtTime(peak,t+up); Owg.gain.linearRampToValueAtTime(0.006,t+up+down);
      Owf.frequency.cancelScheduledValues(t); Owf.frequency.setValueAtTime(Owf.frequency.value,t); Owf.frequency.linearRampToValueAtTime(820,t+up); Owf.frequency.linearRampToValueAtTime(360,t+up+down);}catch(e){}
    setTimeout(oWave,(up+down)*1000+Math.random()*1200);
  } else setTimeout(oWave,1500); }
function oChime(){ if(!OAC) return; try{ var o=OAC.createOscillator(); o.type='triangle'; o.frequency.value=OPENT[(Math.random()*OPENT.length)|0]; var g=OAC.createGain(); o.connect(g); g.connect(touchG||Om); var t=OAC.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.12,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+2.4); o.start(t); o.stop(t+2.5);}catch(e){} }
function oUnlock(){ if(!Ostarted){ Ostarted=true; oInit(); } if(OAC){ try{ OAC.resume(); }catch(e){} } }
function oSetEnabled(on){ OwavesOn=on; if(OAC){ try{ if(!on){ var t=OAC.currentTime; Owg.gain.cancelScheduledValues(t); Owg.gain.setValueAtTime(Math.max(0.0005,Owg.gain.value),t); Owg.gain.linearRampToValueAtTime(0.0005,t+0.8);} OAC.resume(); }catch(e){} } }
function oTone(freq,dur,vol,type){ if(!OAC) return; try{ var o=OAC.createOscillator(); o.type=type||'sine'; o.frequency.value=freq; var g=OAC.createGain(); o.connect(g); g.connect(touchG||Om); var t=OAC.currentTime; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(Math.max(0.0002,vol),t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.start(t); o.stop(t+dur+0.05);}catch(e){} }
function oSetMusic(v){ musicVol=v; if(musicG&&OAC){ try{ musicG.gain.setTargetAtTime(v/10,OAC.currentTime,0.05);}catch(e){ musicG.gain.value=v/10; } } }
function oSetTouch(v){ touchVol=v; if(touchG&&OAC){ try{ touchG.gain.setTargetAtTime(v/10,OAC.currentTime,0.05);}catch(e){ touchG.gain.value=v/10; } } }
window.__ocean={ unlock:oUnlock, chime:oChime, tone:oTone, setEnabled:oSetEnabled, setMusic:oSetMusic, setTouch:oSetTouch, isOn:function(){return OwavesOn;} };
window.addEventListener('pointerdown',oUnlock,true);
var stStyle=document.createElement('style');
stStyle.textContent='@keyframes oBreathe{0%,100%{transform:scale(1);box-shadow:0 0 48px rgba(255,222,176,.20),inset 0 0 26px rgba(255,222,176,.10)}50%{transform:scale(1.06);box-shadow:0 0 82px rgba(255,222,176,.36),inset 0 0 34px rgba(255,222,176,.18)}}#oStart{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,#2c2723,#141110 72%);transition:opacity .65s ease}#oStart button{font:600 21px system-ui,-apple-system,sans-serif;letter-spacing:.14em;text-transform:uppercase;color:#f4eee2;width:164px;height:164px;border-radius:50%;border:1px solid rgba(255,255,255,.34);background:radial-gradient(circle at 50% 40%,rgba(255,236,206,.18),rgba(255,236,206,.04));-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);animation:oBreathe 3.6s ease-in-out infinite;cursor:pointer}';

var stBtn=document.createElement('button'); stBtn.textContent='Start'; stEl.appendChild(stBtn);

function startGo(){ oUnlock(); stEl.style.opacity='0'; setTimeout(function(){ stEl.style.display='none'; },700); }
stEl.addEventListener('click',startGo);

MODES.forEach(m=>{ const b=document.createElement('button'); b.className='mbtn'; b.dataset.key=m.key;
  b.textContent=m.name; b.addEventListener('click',()=>switchTo(m.key)); list.appendChild(b); });

function highlight(){ [...list.children].forEach(b=>b.classList.toggle('active',b.dataset.key===current)); }

// which canvases expose Clear / Eraser (driven through the live iframe, same-origin via srcdoc)
const CAPS={smoke:{clear:1,eraser:0},ribbons:{clear:1,eraser:1},slime:{clear:0,eraser:0},coral:{clear:1,eraser:1},watercolor:{clear:1,eraser:1},inkwater:{clear:0,eraser:0},goo:{clear:0,eraser:0},drift:{clear:0,eraser:0},bloomweave:{clear:0,eraser:0},modus:{clear:0,eraser:0},pulse:{clear:0,eraser:0},balloon:{clear:0,eraser:0},terrarium:{clear:0,eraser:0}};
function childWin(){ try{ return stage.contentWindow; }catch(e){ return null; } }
function childClear(){ const w=childWin(); if(!w) return; const b=w.document&&w.document.getElementById('clearAll'); if(b){ b.click(); } else if(typeof w.clearAll==='function'){ w.clearAll(); } }
function eraserBtn(){ const w=childWin(); return w&&w.document? w.document.getElementById('eraseTool'):null; }
function eraserOn(){ const b=eraserBtn(); return b? /on/i.test(b.textContent):false; }
function sep(){ return Object.assign(document.createElement('div'),{className:'sep'}); }
function volRow(label,val,setter){ const row=document.createElement('div'); row.className='srow';
  const l=document.createElement('span'); l.className='slab'; l.textContent=label;
  const inp=document.createElement('input'); inp.className='sld'; inp.type='range'; inp.min='0'; inp.max='10'; inp.step='1'; inp.value=val;
  const v=document.createElement('span'); v.className='sval'; v.textContent=val;
  inp.addEventListener('input',()=>{ const n=+inp.value; v.textContent=n; setter(n); });
  row.appendChild(l); row.appendChild(inp); row.appendChild(v); return row; }
async function saveCanvas(){ const w=childWin(); if(!w||!w.document) return; const cv=w.document.querySelector('canvas'); if(!cv) return;
  let url; try{ url=cv.toDataURL('image/png'); }catch(e){ return; } closeMenu();
  try{ const blob=await (await fetch(url)).blob(); const file=new File([blob],'fingerpaint.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file]}); return; } }catch(e){}
  const a=document.createElement('a'); a.href=url; a.download='fingerpaint.png'; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); a.remove(); }
function buildActions(){ actions.innerHTML=''; const cap=CAPS[current]||{};
  actions.appendChild(sep());
  if(cap.eraser){ const e=document.createElement('button'); e.className='mbtn'; const set=()=>{ const on=eraserOn(); e.textContent='Eraser: '+(on?'on':'off'); e.classList.toggle('on',on); }; set();
    e.addEventListener('click',()=>{ const b=eraserBtn(); if(b) b.click(); set(); }); actions.appendChild(e); }
  if(cap.clear){ const c=document.createElement('button'); c.className='mbtn'; c.textContent='Clear'; c.addEventListener('click',()=>{ childClear(); closeMenu(); }); actions.appendChild(c); }
  if(current==='watercolor'){ const col=document.createElement('button'); col.className='mbtn'; col.textContent='Colors'; col.addEventListener('click',()=>{ const w=childWin(); if(w&&typeof w.openColorPicker==='function') w.openColorPicker(); closeMenu(); }); actions.appendChild(col); }
  actions.appendChild(volRow('Music',musicVol,oSetMusic));
  actions.appendChild(volRow('Touch',touchVol,oSetTouch));
  const s=document.createElement('button'); s.className='mbtn'; s.textContent='Save image'; s.addEventListener('click',saveCanvas); actions.appendChild(s);
}
function openModes(){ highlight(); menu.classList.add('open'); }
function openActions(){ if(current==='terrarium'||current==='pulse') return; buildActions(); menu2.classList.add('open'); }
function closeMenu(){ menu.classList.remove('open'); menu2.classList.remove('open'); if(!current) switchTo(MODES[0].key); }
function decode(b64){ const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return new TextDecoder('utf-8').decode(bytes); }
function switchTo(key){ const m=MODES.find(x=>x.key===key); if(!m) return;
  if(key!==current){ current=key; stage.srcdoc=decode(m.url.split(',')[1]); }
  menu.classList.remove('open'); menu2.classList.remove('open'); highlight(); flashHint();
  const noOpts=(key==='terrarium'||key==='pulse'); const pbl=document.getElementById('padBL'),pbr=document.getElementById('padBR');
  if(pbl) pbl.style.pointerEvents=noOpts?'none':'auto'; if(pbr) pbr.style.pointerEvents=noOpts?'none':'auto'; }

function flashHint(){ hint.classList.add('show'); tickL.classList.add('show'); tickR.classList.add('show');
  clearTimeout(flashHint._t); flashHint._t=setTimeout(()=>{ hint.classList.remove('show'); tickL.classList.remove('show'); tickR.classList.remove('show'); },3200); }

// two-corner combo (one finger in each top corner)
let tl=false, tr=false;
function arm(){ if(tl&&tr) openModes(); }
const L=document.getElementById('padL'), R=document.getElementById('padR');
L.addEventListener('pointerdown',e=>{tl=true;arm();});
R.addEventListener('pointerdown',e=>{tr=true;arm();});
['pointerup','pointercancel','pointerleave','pointerout'].forEach(ev=>{
  L.addEventListener(ev,()=>tl=false); R.addEventListener(ev,()=>tr=false); });
// bottom two-corner combo opens the per-mode options
let bl=false, br=false;
function armB(){ if(bl&&br) openActions(); }
const BL=document.getElementById('padBL'), BR=document.getElementById('padBR');
BL.addEventListener('pointerdown',e=>{bl=true;armB();});
BR.addEventListener('pointerdown',e=>{br=true;armB();});
['pointerup','pointercancel','pointerleave','pointerout'].forEach(ev=>{
  BL.addEventListener(ev,()=>bl=false); BR.addEventListener(ev,()=>br=false); });
// desktop convenience
addEventListener('keydown',e=>{ if(e.key==='m'||e.key==='M'){ menu.classList.contains('open')?closeMenu():openModes(); } if(e.key==='o'||e.key==='O'){ menu2.classList.contains('open')?closeMenu():openActions(); } });
// tap backdrop (not a button) closes
menu.addEventListener('pointerdown',e=>{ if(e.target===menu) closeMenu(); });
menu2.addEventListener('pointerdown',e=>{ if(e.target===menu2) closeMenu(); });

// keep the active canvas filling the screen across rotation / window resize
function nudgeChild(){ try{ const w=stage.contentWindow; if(w) w.dispatchEvent(new Event('resize')); }catch(e){} }
window.addEventListener('orientationchange',()=>{ setTimeout(nudgeChild,250); setTimeout(nudgeChild,650); });
window.addEventListener('resize',()=>{ clearTimeout(nudgeChild._t); nudgeChild._t=setTimeout(nudgeChild,200); });

// start on Smoke; two-corner combo brings up the picker
stage.addEventListener('load',()=>{ oSetMusic(musicVol); oSetTouch(touchVol); });
switchTo(MODES[0].key);
</script></body></html>
